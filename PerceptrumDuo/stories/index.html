        <h1 class="page-title">Duo Chronicles</h1>
        <p class="page-subtitle">Behind the scenes, artistic theories, and real-time logs from our creative universe.</p>
        
        <!-- This grid element receives target nodes injection from our JS layout compiler -->
        <div class="stories-grid" id="stories-target">
            <!-- Loading placeholder -->
            <p>Gathering archives...</p>
        </div>
    </main>

    <footer>
        &copy; 2026 PerceptrumDuo. All rights reserved.
    </footer>

    <script>
        // Execution engine to pull structure metadata and build user interfaces dynamically
        async function loadStories() {
            const container = document.getElementById('stories-target');
            try {
                // Fetch our dynamic manifest
                const response = await fetch('stories.json');
                if (!response.ok) throw new Error("Could not load tracking register.");
                const stories = await response.json();
                
                // Erase fallback layout state
                container.innerHTML = '';
                
                if(stories.length === 0) {
                    container.innerHTML = '<p>No stories posted yet. Check back soon!</p>';
                    return;
                }

                // Parse records and map layouts contextually
                stories.forEach(story => {
                    const card = document.createElement('a');
                    card.className = 'story-card';
                    // Sets route relative to the context of stories/ folder execution
                    card.href = story.filename;

                    card.innerHTML = `
                        <div class="card-image-wrapper">
                            <img src="../images/${story.image}" alt="${story.title}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <span class="card-date">${story.date}</span>
                            <h2 class="card-title">${story.title}</h2>
                            <p class="card-excerpt">${story.excerpt}</p>
                            <span class="card-more">Read Story</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Index compilation error:", error);
                container.innerHTML = '<p style="color:red;">Error syncing latest entries. Please refresh.</p>';
            }
        }

        // Trigger on load
        document.addEventListener('DOMContentLoaded', loadStories);
    </script>
